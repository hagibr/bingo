<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visualização - Bingo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .drawn-numbers-header {
      justify-content: center;
    }

    .bingo-main {
      max-width: 800px;
    }
  </style>
</head>

<body class="viewer-mode">
  <header class="app-header">
    <div style="display: flex; align-items: center; gap: 10px;">
      <img id="event-icon" src="default-icon.png" alt="Ícone" class="event-icon">
      <h1 id="event-title" style="margin: 0">Carregando Bingo...</h1>
    </div>
    <div style="display: flex; align-items: center; gap: 15px;">
      <div id="auto-follow-container" class="switch-container hidden">
        <label class="switch">
          <input type="checkbox" id="auto-follow-checkbox" checked>
          <span class="slider"></span>
        </label>
        <span style="font-size: 0.8em; color: white; font-weight: bold; white-space: nowrap;">Ao Vivo</span>
      </div>
      <button id="show-qr-button" class="config-button hidden" title="Compartilhar via QR Code">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" style="width: 20px; height: 20px; vertical-align: middle;">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
          <path d="M7 7h.01"></path>
          <path d="M17 7h.01"></path>
          <path d="M17 17h.01"></path>
          <path d="M7 17h.01"></path>
        </svg>
      </button>
      <button id="leave-event-button" class="config-button hidden" title="Sair do Evento"
        style="background-color: #dc3545; display: inline-flex; align-items: center; gap: 8px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" style="width: 16px; height: 16px;">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        Sair
      </button>
    </div>
  </header>

  <main id="main-content" class="bingo-main">
    <!-- Seção de Entrada Manual -->
    <section id="id-entry-section" class="id-entry-section hidden">
      <h2>Entrar em uma Sessão</h2>
      <p>Digite o código fornecido pelo organizador (até 16 caracteres).</p>
      <div class="draw-controls" style="justify-content: center; margin-top: 20px;">
        <input type="text" id="manual-id-input" placeholder="Ex: ABCDEF123456" maxlength="16"
          style="text-transform: uppercase; text-align: center; width: 150px;">
        <button id="join-session-button">Entrar no Bingo</button>
      </div>
    </section>

    <!-- Conteúdo do Bingo (escondido até carregar) -->
    <div id="bingo-content" class="hidden">
      <section class="round-section" style="text-align: center;">
        <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px;">
          <button id="prev-session" class="nav-button hidden" title="Sessão Anterior">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" style="width: 20px; height: 20px; vertical-align: middle;">
              <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
          </button>
          <h3 id="viewed-session-name" style="margin: 0; color: #28a745;">Sessão</h3>
          <button id="next-session" class="nav-button hidden" title="Próxima Sessão">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" style="width: 20px; height: 20px; vertical-align: middle;">
              <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
          </button>
        </div>

        <div class="round-nav-container">
          <div style="display: flex; flex-direction: column; align-items: center; gap: 5px;">
            <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
              <button id="prev-round" class="nav-button" title="Rodada Anterior">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                  stroke-linejoin="round" style="width: 20px; height: 20px; vertical-align: middle;">
                  <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
              </button>
              <h3 id="current-round-label" style="margin: 0;">Rodada</h3>
              <span id="viewing-active-badge" class="active-badge hidden">ATUAL</span>
              <span id="round-completed-status" class="completed-badge hidden">CONCLUÍDA</span>
              <button id="next-round" class="nav-button" title="Próxima Rodada">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                  stroke-linejoin="round" style="width: 20px; height: 20px; vertical-align: middle;">
                  <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
              </button>
            </div>
            <div class="prize-display" style="cursor: default;">
              <span id="prize-label">Aguardando prêmio...</span>
            </div>
          </div>
        </div>
        <div class="pattern-animator">
          <div id="pattern-grid" class="pattern-grid"></div>
          <span id="pattern-name-display"
            style="font-size: 0.85em; font-weight: bold; color: #555; padding: 0 5px;"></span>
        </div>
      </section>

      <section class="drawn-numbers-section">
        <div class="drawn-numbers-header">
          <h2>Números Sorteados <span id="numbers-count"></span></h2>
        </div>
        <div id="drawn-numbers-list" class="drawn-numbers-list"></div>
        <button id="toggle-sort-button" class="toggle-sort-button">Ordem: Sorteio</button>
      </section>
    </div>
  </main>

  <!-- Contêiner de Notificações (Toasts) -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Modal de QR Code Ampliado -->
  <div id="qr-modal" class="modal hidden">
    <div class="modal-content">
      <button id="close-qr-modal-x" class="close-x">&times;</button>
      <h2 style="color: #28a745; margin-bottom: 20px;">Compartilhar Bingo</h2>
      <div id="qrcode-large"></div>
      <p id="qr-link-display" style="margin-top: 10px; font-size: 0.8em; color: #555; white-space: nowrap;"></p>
      <p style="margin-top: 15px; font-size: 0.9em; color: #666;">Aponte a câmera do celular para entrar na sessão.</p>
      <button id="copy-qr-link-button" style="margin-top: 10px; width: 100%; background-color: #6c757d;">Copiar
        URL</button>
      <button id="close-qr-modal-button" style="margin-top: 10px; width: 100%;">Fechar</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="qrcode.min.js"></script>
  <script src="firebase-config.js"></script>
  <script src="view.js"></script>
</body>

</html>
